<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#09090b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="description" content="登录 CWJ TOOLS — 访问你的 AI 工作空间">
<title>登录 — CWJ TOOLS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.login-glow{position:absolute;width:600px;height:600px;border-radius:50%;filter:blur(100px);opacity:0.1;pointer-events:none}
.login-glow-1{top:-200px;right:-100px;background:#6366f1}
.login-glow-2{bottom:-200px;left:-100px;background:#8b5cf6}
.login-card{width:100%;max-width:420px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-2xl);padding:40px 36px;position:relative;z-index:2}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g-1);border-radius:var(--r-2xl) var(--r-2xl) 0 0}
.login-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;margin-bottom:32px;justify-content:center}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--text-4);text-align:center;margin-bottom:28px}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:12px;color:var(--text-5)}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.social-btns{display:flex;gap:10px;margin-bottom:20px}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg-3);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--dur-fast)}
.social-btn:hover{background:var(--bg-4);border-color:var(--border-2)}
.login-link{text-align:center;margin-top:20px;font-size:13px;color:var(--text-4)}
.login-link a{color:var(--accent-3);font-weight:500}
.login-link a:hover{text-decoration:underline}
.login-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.login-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:var(--text-4);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--dur-fast)}
.login-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.login-form{display:none}
.login-form.active{display:block}
.login-error{font-size:12px;color:var(--red);margin-top:4px;display:none}
.login-error.show{display:block}
.login-success{font-size:13px;color:var(--green);text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="loading-overlay"><svg class="svg-loader" viewBox="0 0 48 48" width="48" height="48"><circle cx="24" cy="24" r="20" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-dasharray="120" stroke-dashoffset="120" style="animation:strokeDraw 1.5s ease-in-out infinite;transform-origin:center"/></svg><div class="loading-text">加载中...</div></div>
<a class="skip-link" href="#loginForm">跳转到登录表单</a>
<div class="login-page breath-bg" id="main">
  <div class="login-glow login-glow-1"></div>
  <div class="login-glow login-glow-2"></div>
  <div class="login-card" data-tilt>
    <div style="position:absolute;top:16px;right:16px;z-index:10"><button class="theme-toggle" aria-label="切换主题"><i class="fas fa-sun"></i></button></div>
    <div class="login-logo"><div class="logo-icon">C</div> CWJ TOOLS</div>

    <div class="login-tabs">
      <div class="login-tab active" data-tab="login">登录</div>
      <div class="login-tab" data-tab="register">注册</div>
    </div>

    <!-- Login Form -->
    <div class="login-form active" id="loginForm">
      <div class="social-btns">
        <button class="social-btn" onclick="socialLogin('Google')"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn" onclick="socialLogin('GitHub')"><i class="fab fa-github"></i> GitHub</button>
        <button class="social-btn" onclick="socialLogin('微信')"><i class="fab fa-weixin" style="color:#22c55e"></i> 微信</button>
      </div>
      <div class="login-divider">或使用邮箱登录</div>
      <div class="form-group">
        <label class="form-label" for="loginEmail">邮箱地址</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="name@example.com">
        <div class="login-error" id="loginEmailErr">请输入有效的邮箱地址</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">密码</label>
        <input class="form-input" id="loginPass" type="password" placeholder="输入密码">
        <div class="login-error" id="loginPassErr">密码不能为空</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-4);cursor:pointer"><input type="checkbox" style="accent-color:var(--accent)"> 记住我</label>
        <a href="#" style="font-size:13px;color:var(--accent-3)">忘记密码？</a>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" data-magnetic onclick="doLogin()">登录</button>
      <p class="login-link">还没有账号？<a href="#" onclick="switchTab('register');return false">免费注册</a></p>
    </div>

    <!-- Register Form -->
    <div class="login-form" id="registerForm">
      <div class="form-group">
        <label class="form-label" for="regName">用户名</label>
        <input class="form-input" id="regName" type="text" placeholder="输入用户名">
        <div class="login-error" id="regNameErr">用户名至少 2 个字符</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">邮箱地址</label>
        <input class="form-input" id="regEmail" type="email" placeholder="name@example.com">
        <div class="login-error" id="regEmailErr">请输入有效的邮箱地址</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPass">密码</label>
        <input class="form-input" id="regPass" type="password" placeholder="至少 6 位密码">
        <div class="login-error" id="regPassErr">密码至少 6 位</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPass2">确认密码</label>
        <input class="form-input" id="regPass2" type="password" placeholder="再次输入密码">
        <div class="login-error" id="regPass2Err">两次密码不一致</div>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" data-magnetic onclick="doRegister()">注册</button>
      <p class="login-link">已有账号？<a href="#" onclick="switchTab('login');return false">立即登录</a></p>
    </div>

    <div class="login-success" id="loginSuccess"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="api.js"></script>
<script src="shared.js"></script>
<script>
function switchTab(tab){
  document.querySelectorAll('.login-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});
  document.getElementById('loginForm').classList.toggle('active',tab==='login');
  document.getElementById('registerForm').classList.toggle('active',tab==='register');
  document.querySelectorAll('.login-error').forEach(function(e){e.classList.remove('show')});
}
document.querySelectorAll('.login-tab').forEach(function(t){t.addEventListener('click',function(){switchTab(t.dataset.tab)})});

function showError(id){document.getElementById(id).classList.add('show')}
function hideError(id){document.getElementById(id).classList.remove('show')}
function isValidEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}

function doLogin(){
  var valid=true;
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  if(!isValidEmail(email)){showError('loginEmailErr');valid=false}else{hideError('loginEmailErr')}
  if(!pass){showError('loginPassErr');valid=false}else{hideError('loginPassErr')}
  if(!valid)return;
  api.auth.login(email,pass).then(function(res){
    BadgeToast.show('登录成功','✓','success');
    var el=document.getElementById('loginSuccess');
    el.textContent='✓ 登录成功，正在跳转...';el.style.display='block';
    setTimeout(function(){location.href='dashboard.html'},800);
  });
}

function doRegister(){
  var valid=true;
  var name=document.getElementById('regName').value.trim();
  var email=document.getElementById('regEmail').value.trim();
  var pass=document.getElementById('regPass').value;
  var pass2=document.getElementById('regPass2').value;
  if(name.length<2){showError('regNameErr');valid=false}else{hideError('regNameErr')}
  if(!isValidEmail(email)){showError('regEmailErr');valid=false}else{hideError('regEmailErr')}
  if(pass.length<6){showError('regPassErr');valid=false}else{hideError('regPassErr')}
  if(pass!==pass2){showError('regPass2Err');valid=false}else{hideError('regPass2Err')}
  if(!valid)return;
  api.auth.register(name,email,pass).then(function(res){
    BadgeToast.show('注册成功','✓','success');
    var el=document.getElementById('loginSuccess');
    el.textContent='✓ 注册成功，正在跳转...';el.style.display='block';
    setTimeout(function(){location.href='dashboard.html'},800);
  });
}

function socialLogin(provider){
  AuthMock.login('user@'+provider.toLowerCase()+'.com');
  showToast('通过 '+provider+' 登录成功');BadgeToast.show('登录成功','✓','success');
  setTimeout(function(){location.href='dashboard.html'},600);
}

/* Enter key support */
document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
document.getElementById('regPass2').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()});
</script>
</body>
</html>
